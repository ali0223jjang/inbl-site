<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — InfiniteBlock</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
<script src="../js/config.js"></script>
<script>
(function() {
  const auth = JSON.parse(sessionStorage.getItem('admin_auth') || '{}');
  if (!auth.ok || Date.now() > auth.expiry) {
    sessionStorage.removeItem('admin_auth');
    window.location.href = 'login.html';
  }
})();
</script>
<nav class="admin-nav">
  <div class="admin-nav-brand">INFINITE<span>BLOCK</span> Admin</div>
  <button class="admin-tab-btn active" data-tab="notice">공지사항</button>
  <button class="admin-tab-btn" data-tab="privacy">개인정보처리방침</button>
  <button class="admin-tab-btn" data-tab="inquiries">문의내역</button>
  <button class="admin-logout-btn" id="logout-btn">로그아웃</button>
</nav>
<div class="admin-dash">
<div class="admin-content">

  <div class="tab-panel active" id="tab-notice">
    <h2 class="admin-section-title">공지사항 관리</h2>
    <div class="notice-editor-form">
      <div>
        <label>제목 *</label>
        <input type="text" id="notice-title-input" placeholder="공지사항 제목을 입력하세요" />
      </div>
      <div>
        <label>내용 *</label>
        <textarea id="notice-body-input" rows="8" placeholder="공지사항 내용을 입력하세요."></textarea>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="admin-btn" id="save-notice-btn" style="max-width:180px;">공지사항 등록</button>
        <span style="font-size:13px;color:var(--gray-3);" id="notice-save-status"></span>
      </div>
    </div>
    <h3 style="font-family:var(--font-ui);font-size:15px;font-weight:700;color:var(--white);margin-bottom:16px;">등록된 공지사항</h3>
    <table class="admin-notice-table">
      <thead><tr><th>번호</th><th>제목</th><th>등록일</th><th>삭제</th></tr></thead>
      <tbody id="notice-admin-tbody">
        <tr><td colspan="4" style="color:var(--gray-3);text-align:center;padding:32px;">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="tab-panel" id="tab-privacy">
    <h2 class="admin-section-title">개인정보처리방침 수정</h2>
    <div class="privacy-editor-wrap">
      <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center;">
        <button class="admin-btn" id="save-privacy-btn" style="max-width:180px;">저장</button>
        <span style="font-size:13px;color:var(--gray-3);" id="privacy-save-status"></span>
      </div>
      <div style="margin-bottom:12px;font-size:12px;color:var(--gray-3);">HTML 또는 일반 텍스트로 작성 가능합니다.</div>
      <textarea id="privacy-editor" placeholder="개인정보처리방침 내용을 입력하세요..."></textarea>
    </div>
  </div>

  <div class="tab-panel" id="tab-inquiries">
    <h2 class="admin-section-title">서비스 문의 내역</h2>
    <table class="admin-notice-table">
      <thead><tr><th>#</th><th>이름</th><th>이메일</th><th>문의 내용</th><th>접수일</th></tr></thead>
      <tbody id="inquiry-tbody">
        <tr><td colspan="5" style="color:var(--gray-3);text-align:center;padding:32px;">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>
</div>

<script>
document.querySelectorAll('.admin-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'notice') loadNotices();
    if (btn.dataset.tab === 'privacy') loadPrivacy();
    if (btn.dataset.tab === 'inquiries') loadInquiries();
  });
});

document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_auth');
  window.location.href = 'login.html';
});

async function sbFetch(path, opts = {}) {
  const headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
    'Prefer': 'return=representation',
    ...opts.headers,
  };
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, { ...opts, headers });
}

async function loadNotices() {
  const tbody = document.getElementById('notice-admin-tbody');
  tbody.innerHTML = '<tr><td colspan="4" style="color:var(--gray-3);text-align:center;padding:32px;">불러오는 중...</td></tr>';
  try {
    const res = await sbFetch('notices?select=*&order=created_at.desc');
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:var(--gray-3);text-align:center;padding:32px;">등록된 공지사항이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map((n, i) => `
      <tr>
        <td style="color:var(--accent);font-family:var(--font-ui);font-weight:700;">${data.length - i}</td>
        <td style="color:var(--gray-1);max-width:400px;">${n.title}</td>
        <td style="color:var(--gray-3);font-size:12px;">${n.created_at?.slice(0,10) || '-'}</td>
        <td><button class="btn-delete" onclick="deleteNotice('${n.id}')">삭제</button></td>
      </tr>`).join('');
  } catch {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#ff6b6b;text-align:center;padding:32px;">Supabase 연결 오류. config.js를 확인하세요.</td></tr>';
  }
}

document.getElementById('save-notice-btn').addEventListener('click', async () => {
  const title = document.getElementById('notice-title-input').value.trim();
  const body = document.getElementById('notice-body-input').value.trim();
  const status = document.getElementById('notice-save-status');
  if (!title || !body) { status.style.color='#ff6b6b'; status.textContent = '제목과 내용을 모두 입력해주세요.'; return; }
  status.style.color = 'var(--gray-3)'; status.textContent = '저장 중...';
  try {
    const res = await sbFetch('notices', {
      method: 'POST',
      body: JSON.stringify({ title, body, created_at: new Date().toISOString() }),
    });
    if (res.ok || res.status === 201) {
      status.style.color = 'var(--accent)'; status.textContent = '✓ 등록 완료!';
      document.getElementById('notice-title-input').value = '';
      document.getElementById('notice-body-input').value = '';
      loadNotices();
      setTimeout(() => status.textContent = '', 3000);
    } else throw new Error();
  } catch {
    status.style.color = '#ff6b6b'; status.textContent = '저장 실패. Supabase 연결을 확인하세요.';
  }
});

async function deleteNotice(id) {
  if (!confirm('이 공지사항을 삭제하시겠습니까?')) return;
  try {
    await sbFetch(`notices?id=eq.${id}`, { method: 'DELETE' });
    loadNotices();
  } catch { alert('삭제 실패'); }
}

async function loadPrivacy() {
  const editor = document.getElementById('privacy-editor');
  try {
    const res = await sbFetch('settings?key=eq.privacy_policy&select=value&limit=1');
    const data = await res.json();
    editor.value = data[0]?.value || '';
  } catch { editor.value = ''; }
}

document.getElementById('save-privacy-btn').addEventListener('click', async () => {
  const value = document.getElementById('privacy-editor').value;
  const status = document.getElementById('privacy-save-status');
  status.style.color = 'var(--gray-3)'; status.textContent = '저장 중...';
  try {
    const res = await sbFetch('settings', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ key: 'privacy_policy', value, updated_at: new Date().toISOString() }),
    });
    if (res.ok || res.status === 201) {
      status.style.color = 'var(--accent)'; status.textContent = '✓ 저장 완료!';
      setTimeout(() => status.textContent = '', 3000);
    } else throw new Error();
  } catch {
    status.style.color = '#ff6b6b'; status.textContent = '저장 실패.';
  }
});

async function loadInquiries() {
  const tbody = document.getElementById('inquiry-tbody');
  tbody.innerHTML = '<tr><td colspan="5" style="color:var(--gray-3);text-align:center;padding:32px;">불러오는 중...</td></tr>';
  try {
    const res = await sbFetch('contact_inquiries?select=*&order=created_at.desc');
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:var(--gray-3);text-align:center;padding:32px;">접수된 문의가 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map((q, i) => `
      <tr>
        <td style="color:var(--gray-3);">${data.length - i}</td>
        <td style="color:var(--gray-1);">${q.name}</td>
        <td><a href="mailto:${q.email}" style="color:var(--accent);">${q.email}</a></td>
        <td style="color:var(--gray-2);max-width:300px;font-size:12px;">${q.message?.slice(0,80)}${q.message?.length > 80 ? '...' : ''}</td>
        <td style="color:var(--gray-3);font-size:12px;">${q.created_at?.slice(0,10) || '-'}</td>
      </tr>`).join('');
  } catch {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#ff6b6b;text-align:center;padding:32px;">Supabase 연결 오류.</td></tr>';
  }
}

loadNotices();
</script>
</body>
</html>
